<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每周会议保障清单 - 安全认证</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 核心样式：模拟图片中的圆角阴影表格 */
        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            background: white;
        }

        table { border-collapse: collapse; width: 100%; }
        
        /* 表头样式：灰色背景、加粗文字、垂直居中 */
        thead th {
            background-color: #f9fafb; /* 浅灰色背景 */
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #f3f4f6;
            color: #374151;
            font-weight: 700;
            padding: 16px 12px !important;
            font-size: 0.95rem;
            vertical-align: middle;
        }

        /* 单元格样式 */
        tbody td {
            border-bottom: 1px solid #f3f4f6;
            border-right: 1px solid #f3f4f6;
            padding: 14px 12px !important;
            vertical-align: middle;
        }

        tbody tr:last-child td { border-bottom: none; }
        th:last-child, td:last-child { border-right: none; }

        /* 隐藏主内容，验证通过后显示 */
        #mainContent { display: none; }

        /* 主办科室专用：强制不换行 */
        .dept-column {
            white-space: nowrap !important;
            width: 1%; 
        }

        /* 保障备注专用：允许换行并吸收压缩压力 */
        .notes-column {
            min-width: 180px;
            word-break: break-all;
            white-space: normal !important;
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999] overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-200"></div>
        <div class="relative bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[400px] border border-white/50 text-center">
            <div class="w-20 h-20 bg-blue-500 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-black mb-2 text-gray-800 tracking-tight">安全认证</h2>
            <div class="space-y-4">
                <input type="password" id="webPassInput" placeholder="请输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="w-full bg-white/50 border border-blue-100 p-4 rounded-2xl focus:ring-4 focus:ring-blue-400/20 focus:border-blue-400 outline-none transition-all text-center text-lg font-bold text-blue-900">
                <button onclick="checkLogin()" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-200 transition-all active:scale-[0.98]">立即进入</button>
            </div>
            <p id="loginError" class="text-red-500 mt-4 text-sm font-medium hidden">⚠️ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" class="p-6">
        <div class="w-[98%] mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-black text-blue-600">📊 每周会议保障排期表</h1>
                <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-sm flex items-center gap-1 transition-colors">
                    <span>退出登录</span>
                </button>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-gray-100" id="formContainer">
                <h2 class="text-xl font-bold mb-4 text-gray-700" id="formTitle">➕ 新增会议任务</h2>
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_id" value="">
                    <input type="text" id="title" placeholder="会议名称" required class="border p-3 rounded-xl md:col-span-2 bg-gray-50 focus:bg-white outline-none">
                    <input type="datetime-local" id="meeting_time" required class="border p-3 rounded-xl bg-gray-50">
                    <input type="text" id="location" placeholder="会议地点" required class="border p-3 rounded-xl bg-gray-50">
                    <select id="meeting_type" class="border p-3 rounded-xl bg-gray-50">
                        <option value="本地会">本地会</option>
                        <option value="视频会">视频会</option>
                        <option value="其他">其他</option>
                    </select>
                    <input type="text" id="department" placeholder="主办科室" class="border p-3 rounded-xl bg-gray-50">
                    <select id="status" class="border p-3 rounded-xl bg-gray-50">
                        <option value="都不参加">都不参加</option>
                        <option value="区市参加">区市参加</option>
                        <option value="区市、镇街参加">区市、镇街参加</option>
                    </select>
                    <input type="text" id="leader" placeholder="参会领导" class="border p-3 rounded-xl bg-gray-50">
                    <input type="text" id="notes" placeholder="备注" class="border p-3 rounded-xl md:col-span-4 bg-gray-50">
                    <div class="md:col-span-4 mt-2">
                        <button type="submit" id="submitBtn" class="w-full bg-blue-500 text-white p-4 rounded-xl font-black text-lg shadow-lg">保存会议排期</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <div class="overflow-x-auto">
                    <table>
                        <thead>
                            <tr>
                                <th class="text-center">序号</th>
                                <th class="text-center">会议名称</th>
                                <th class="text-center">时间</th>
                                <th class="text-center">地点</th>
                                <th class="text-center">类型</th>
                                <th class="text-center dept-column">主办科室</th>
                                <th class="text-center">参会领导</th>
                                <th class="text-center">参会范围</th>
                                <th class="text-left notes-column">保障备注</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="meetingList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        function logout() { sessionStorage.removeItem('meeting_access_token'); location.reload(); }

        async function loadMeetings() {
            try {
                const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
                if (!res.ok) { logout(); return; }
                meetingDataList = await res.json();
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            meetingDataList.forEach((m, index) => {
                let statusColor = m.status.includes('镇街') ? 'text-red-600 font-black' : (m.status.includes('区市') ? 'text-blue-600 font-black' : 'text-gray-500');
                let typeStyle = m.meeting_type === '视频会' ? 'bg-purple-100 text-purple-700 border-purple-200' : 'bg-gray-100 text-gray-700 border-gray-200';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-blue-50/30 transition-colors">
                        <td class="text-center text-gray-400 font-mono">${index + 1}</td>
                        <td class="font-bold text-gray-800 text-center">${m.title}</td>
                        <td class="text-center whitespace-nowrap text-gray-500 text-sm">${m.meeting_time.replace('T', ' ')}</td>
                        <td class="text-center text-gray-600">${m.location}</td>
                        <td class="text-center">
                            <span class="px-3 py-1 rounded-full text-xs font-bold border ${typeStyle}">${m.meeting_type}</span>
                        </td>
                        <td class="text-center text-gray-600 dept-column">${m.department || '-'}</td>
                        <td class="text-center">${createLeaderTags(m.leader)}</td>
                        <td class="text-center whitespace-nowrap ${statusColor}">${m.status}</td>
                        <td class="notes-column text-gray-500 text-sm leading-relaxed">${m.notes || '-'}</td>
                        <td class="text-center whitespace-nowrap">
                            <button onclick="editMeeting(${m.id})" class="text-blue-500 hover:text-blue-700 font-bold mr-3 underline">修改</button>
                            <button onclick="deleteMeeting(${m.id})" class="text-red-400 hover:text-red-600 font-bold underline">删除</button>
                        </td>
                    </tr>`;
            });
        }

        function createLeaderTags(str) {
            if (!str || str === '-') return '-';
            return str.split(/[、,，\s]+/).filter(n => n.trim() !== '').map(name => 
                `<span class="inline-block bg-blue-50 text-black border border-blue-100 px-2 py-0.5 rounded-lg mr-1 mb-1 text-sm font-bold whitespace-nowrap">${name}</span>`
            ).join('');
        }

        // 保存/修改逻辑
        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            resetForm(); loadMeetings();
        });

        async function deleteMeeting(id) {
            const pwd = prompt("删除确认密码：");
            if (!pwd) return;
            const res = await fetch(`/api/meetings?id=${id}`, {
                method: 'DELETE',
                headers: { 'X-Admin-Password': pwd, 'X-Web-Password': authToken }
            });
            if (res.ok) loadMeetings(); else alert("密码错误");
        }

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department;
            document.getElementById('leader').value = m.leader;
            document.getElementById('status').value = m.status;
            document.getElementById('notes').value = m.notes;
            document.getElementById('formTitle').innerText = '✏️ 修改会议记录';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('addMeetingForm').reset();
            document.getElementById('edit_id').value = '';
            document.getElementById('formTitle').innerText = '➕ 新增会议任务';
        }
    </script>
</body>
</html>
